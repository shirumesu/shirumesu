<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="60" viewBox="0 0 800 60">
  <defs>
    <pattern id="notebookDots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffc9e0" opacity="0.15" />
    </pattern>
    <filter id="pencil">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="1" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.5" />
    </filter>
  </defs>
  
  <!-- 纸张背景 -->
  <rect width="800" height="60" fill="#fffbf5" opacity="0.3"/>
  <rect width="800" height="60" fill="url(#notebookDots)"/>
  
  <!-- 手绘线条 -->
  <path d="M 50 30 Q 100 28 150 30 Q 200 32 250 30 Q 300 28 350 30 Q 400 32 450 30 Q 500 28 550 30 Q 600 32 650 30 Q 700 28 750 30" 
        stroke="#8b6680" stroke-width="2" fill="none" filter="url(#pencil)" opacity="0.6"/>
  
  <!-- 纸胶带效果 -->
  <g opacity="0.4">
    <rect x="150" y="20" width="80" height="20" rx="2" fill="#ffc9e0" opacity="0.3"/>
    <rect x="152" y="22" width="76" height="16" rx="1" fill="none" stroke="#ffb7d5" stroke-width="1" stroke-dasharray="2,2"/>
  </g>
  
  <g opacity="0.4">
    <rect x="570" y="20" width="80" height="20" rx="2" fill="#b4f8c8" opacity="0.3"/>
    <rect x="572" y="22" width="76" height="16" rx="1" fill="none" stroke="#a0e7c8" stroke-width="1" stroke-dasharray="2,2"/>
  </g>
  
  <!-- 手绘樱花贴纸 -->
  <g transform="translate(400, 30)">
    <ellipse cx="0" cy="0" rx="18" ry="16" fill="#fff" opacity="0.8"/>
    <path d="M 0 0 Q -2 -3 0 -6 Q 2 -3 0 0 Z" fill="#ffb7d5" />
    <path d="M 0 0 Q 3 -2 6 0 Q 3 2 0 0 Z" fill="#ffc9e0" />
    <path d="M 0 0 Q 2 3 0 6 Q -2 3 0 0 Z" fill="#ffb7d5" />
    <path d="M 0 0 Q -3 2 -6 0 Q -3 -2 0 0 Z" fill="#ffc9e0" />
    <circle cx="0" cy="0" r="2.5" fill="#ffdbeb" />
  </g>
  
  <!-- 小星星贴纸 -->
  <g transform="translate(100, 30)" opacity="0.6">
    <circle cx="0" cy="0" r="10" fill="#fff" opacity="0.7"/>
    <path d="M 0 -5 l 1.5 3 l 3.5 0.5 l -2.5 2.5 l 0.5 3.5 l -3 -1.5 l -3 1.5 l 0.5 -3.5 l -2.5 -2.5 l 3.5 -0.5 z" fill="#b4f8c8" />
  </g>
  
  <g transform="translate(700, 30)" opacity="0.6">
    <circle cx="0" cy="0" r="10" fill="#fff" opacity="0.7"/>
    <path d="M 0 -5 l 1.5 3 l 3.5 0.5 l -2.5 2.5 l 0.5 3.5 l -3 -1.5 l -3 1.5 l 0.5 -3.5 l -2.5 -2.5 l 3.5 -0.5 z" fill="#ffc9e0" />
  </g>
  
  <!-- 散落的小点 -->
  <circle cx="250" cy="15" r="2" fill="#ffc9e0" opacity="0.4" />
  <circle cx="350" cy="45" r="1.5" fill="#b4f8c8" opacity="0.4" />
  <circle cx="450" cy="15" r="2" fill="#b4f8c8" opacity="0.4" />
  <circle cx="550" cy="45" r="1.5" fill="#ffc9e0" opacity="0.4" />
</svg>
