<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="28" viewBox="0 0 800 28">
  <defs>
    <pattern id="notebookDots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffc9e0" opacity="0.15" />
    </pattern>
    <filter id="pencil">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="1" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.5" />
    </filter>
  </defs>
  
  <!-- 纸张背景 -->
  <rect width="800" height="28" fill="#fffbf5" opacity="0.14"/>
  <rect width="800" height="28" fill="url(#notebookDots)" opacity="0.55"/>
  
  <!-- 手绘线条 -->
  <path d="M 50 14 Q 100 13 150 14 Q 200 15 250 14 Q 300 13 350 14 Q 400 15 450 14 Q 500 13 550 14 Q 600 15 650 14 Q 700 13 750 14" 
        stroke="#8b6680" stroke-width="1.8" fill="none" filter="url(#pencil)" opacity="0.62"/>
  
  <!-- 纸胶带效果 -->
  <g opacity="0.4">
    <rect x="150" y="6" width="80" height="12" rx="2" fill="#ffc9e0" opacity="0.24"/>
    <rect x="152" y="7" width="76" height="10" rx="1" fill="none" stroke="#ffb7d5" stroke-width="1" stroke-dasharray="2,2"/>
  </g>
  
  <g opacity="0.4">
    <rect x="570" y="6" width="80" height="12" rx="2" fill="#b4f8c8" opacity="0.24"/>
    <rect x="572" y="7" width="76" height="10" rx="1" fill="none" stroke="#a0e7c8" stroke-width="1" stroke-dasharray="2,2"/>
  </g>
  
  <!-- 手绘樱花贴纸 -->
  <g transform="translate(400, 14)">
    <ellipse cx="0" cy="0" rx="12" ry="10" fill="#fff" opacity="0.82"/>
    <path d="M 0 0 Q -2 -2 0 -5 Q 2 -2 0 0 Z" fill="#ffb7d5" />
    <path d="M 0 0 Q 2 -2 5 0 Q 2 2 0 0 Z" fill="#ffc9e0" />
    <path d="M 0 0 Q 2 2 0 5 Q -2 2 0 0 Z" fill="#ffb7d5" />
    <path d="M 0 0 Q -2 2 -5 0 Q -2 -2 0 0 Z" fill="#ffc9e0" />
    <circle cx="0" cy="0" r="2" fill="#ffdbeb" />
  </g>
  
  <!-- 小星星贴纸 -->
  <g transform="translate(100, 14)" opacity="0.56">
    <circle cx="0" cy="0" r="7" fill="#fff" opacity="0.7"/>
    <path d="M 0 -4 l 1.2 2.4 l 2.8 0.4 l -2 2 l 0.4 2.8 l -2.4 -1.2 l -2.4 1.2 l 0.4 -2.8 l -2 -2 l 2.8 -0.4 z" fill="#b4f8c8" />
  </g>
  
  <g transform="translate(700, 14)" opacity="0.56">
    <circle cx="0" cy="0" r="7" fill="#fff" opacity="0.7"/>
    <path d="M 0 -4 l 1.2 2.4 l 2.8 0.4 l -2 2 l 0.4 2.8 l -2.4 -1.2 l -2.4 1.2 l 0.4 -2.8 l -2 -2 l 2.8 -0.4 z" fill="#ffc9e0" />
  </g>
  
  <!-- 散落的小点 -->
  <circle cx="250" cy="6" r="1.8" fill="#ffc9e0" opacity="0.34" />
  <circle cx="350" cy="22" r="1.3" fill="#b4f8c8" opacity="0.34" />
  <circle cx="450" cy="6" r="1.8" fill="#b4f8c8" opacity="0.34" />
  <circle cx="550" cy="22" r="1.3" fill="#ffc9e0" opacity="0.34" />
</svg>
