<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="100" viewBox="0 0 800 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5f8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0fdf4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff5f8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="100" fill="url(#bgGrad)" opacity="0.3"/>
  
  <!-- 装饰性波浪 -->
  <path d="M 0 20 Q 100 15 200 20 T 400 20 T 600 20 T 800 20" stroke="#ffc9e0" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M 0 80 Q 100 85 200 80 T 400 80 T 600 80 T 800 80" stroke="#b4f8c8" stroke-width="1.5" fill="none" opacity="0.3"/>
  
  <!-- 左上角装饰 -->
  <circle cx="50" cy="30" r="15" fill="#ffc9e0" opacity="0.2"/>
  <circle cx="45" cy="25" r="10" fill="#b4f8c8" opacity="0.2"/>
  <path d="M 40 25 l 1 3 l 3 1 l -3 1 l -1 3 l -1 -3 l -3 -1 l 3 -1 z" fill="#ffb7d5" opacity="0.6" />
  
  <!-- 右上角装饰 -->
  <circle cx="750" cy="30" r="15" fill="#b4f8c8" opacity="0.2"/>
  <circle cx="755" cy="25" r="10" fill="#ffc9e0" opacity="0.2"/>
  <path d="M 760 25 l 1 3 l 3 1 l -3 1 l -1 3 l -1 -3 l -3 -1 l 3 -1 z" fill="#b4f8c8" opacity="0.6" />
  
  <!-- 左下角装饰 -->
  <circle cx="50" cy="70" r="12" fill="#b4f8c8" opacity="0.2"/>
  <circle cx="55" cy="75" r="8" fill="#ffc9e0" opacity="0.2"/>
  
  <!-- 右下角装饰 -->
  <circle cx="750" cy="70" r="12" fill="#ffc9e0" opacity="0.2"/>
  <circle cx="745" cy="75" r="8" fill="#b4f8c8" opacity="0.2"/>
  
  <!-- 中心樱花 -->
  <g transform="translate(400, 50)">
    <path d="M 0 0 Q -2 -2 0 -4 Q 2 -2 0 0 Z" fill="#ffb7d5" opacity="0.4"/>
    <path d="M 0 0 Q 2 -2 4 0 Q 2 2 0 0 Z" fill="#b4f8c8" opacity="0.4"/>
    <path d="M 0 0 Q 2 2 0 4 Q -2 2 0 0 Z" fill="#ffb7d5" opacity="0.4"/>
    <path d="M 0 0 Q -2 2 -4 0 Q -2 -2 0 0 Z" fill="#b4f8c8" opacity="0.4"/>
    <circle cx="0" cy="0" r="2" fill="#ffdbeb" opacity="0.6"/>
  </g>
  
  <!-- 散落的小装饰 -->
  <circle cx="150" cy="40" r="3" fill="#ffc9e0" opacity="0.3"/>
  <circle cx="300" cy="60" r="2" fill="#b4f8c8" opacity="0.3"/>
  <circle cx="500" cy="35" r="3" fill="#b4f8c8" opacity="0.3"/>
  <circle cx="650" cy="65" r="2" fill="#ffc9e0" opacity="0.3"/>
</svg>
